<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kudos Board · Datacom Internal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="topbar">
  <div class="topbar__brand">
    <span class="topbar__mark">✦</span>
    <span class="topbar__title">Kudos Board</span>
  </div>
  <div class="topbar__user" id="userSwitcherMount"></div>
</header>

<main class="layout">

  <section class="composer" aria-labelledby="composerHeading">
    <h1 id="composerHeading" class="composer__heading">Give someone a kudos</h1>
    <p class="composer__sub">A small note of appreciation, visible to the whole team.</p>
    <form id="kudosForm" class="composer__form">
      <label class="field">
        <span class="field__label">To</span>
        <select id="recipientSelect" class="field__input" required></select>
      </label>
      <label class="field">
        <span class="field__label">Message</span>
        <textarea id="messageInput" class="field__input field__input--textarea"
                  maxlength="500" rows="3"
                  placeholder="Thanks for jumping in on the migration last night…" required></textarea>
        <span class="field__hint"><span id="charCount">0</span>/500</span>
      </label>
      <div id="formError" class="form-error" role="alert" hidden></div>
      <button type="submit" class="btn btn--primary">Send kudos</button>
    </form>
  </section>

  <section class="feed" aria-labelledby="feedHeading">
    <div class="feed__header">
      <h2 id="feedHeading" class="feed__heading">Recent kudos</h2>
      <button id="refreshFeedBtn" class="btn btn--ghost" type="button">Refresh</button>
    </div>
    <div id="feedList" class="feed__list" aria-live="polite"></div>
    <div id="feedEmpty" class="feed__empty" hidden>
      No kudos yet — be the first to send one above.
    </div>
    <button id="loadMoreBtn" class="btn btn--ghost feed__load-more" type="button" hidden>
      Load more
    </button>
  </section>

  <section id="adminSection" class="admin" aria-labelledby="adminHeading" hidden>
    <h2 id="adminHeading" class="admin__heading">Moderation</h2>
    <p class="admin__sub">Visible only to admins. Hide or remove inappropriate kudos.</p>
    <div id="adminList" class="admin__list"></div>
  </section>

</main>

<div id="toast" class="toast" role="status" hidden></div>

<script src="app.js"></script>
</body>
</html>
